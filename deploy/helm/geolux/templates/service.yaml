apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-geolux
  labels:
    app: geolux
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8091
      protocol: TCP
  selector:
    app: geolux
    app.kubernetes.io/instance: {{ .Release.Name }}
