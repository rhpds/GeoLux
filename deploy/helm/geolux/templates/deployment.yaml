apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-geolux
  labels:
    app: geolux
    app.kubernetes.io/name: geolux
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: geolux
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: geolux
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: geolux
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8091
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: GEOLUX_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_MODE
            - name: GEOLUX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: GEOLUX_LITELLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_LITELLM_URL
            - name: GEOLUX_LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: litellm-api-key
            - name: GEOLUX_LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_LLM_MODEL
            - name: GEOLUX_STABILITY_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_STABILITY_THRESHOLD
            - name: GEOLUX_KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_KAFKA_BROKERS
            - name: GEOLUX_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.oauth.enabled }}
        - name: oauth-proxy
          image: {{ .Values.oauth.image | default "registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest" }}
          ports:
            - containerPort: 8080
              name: proxy
          args:
            - --https-address=
            - --http-address=:8080
            - --upstream=http://localhost:8091
            - --cookie-secret-file=/var/run/secrets/oauth/cookie-secret
            - --cookie-name=_geolux_oauth
            - --provider=openshift
            - --openshift-service-account={{ .Values.serviceAccount.name }}
            - --pass-user-headers=true
          volumeMounts:
            - name: oauth-cookie
              mountPath: /var/run/secrets/oauth
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        {{- end }}
      {{- if .Values.oauth.enabled }}
      volumes:
        - name: oauth-cookie
          secret:
            secretName: {{ .Values.oauth.cookieSecretName | default "geolux-oauth-cookie" }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
