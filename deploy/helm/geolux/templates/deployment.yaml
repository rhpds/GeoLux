apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-geolux
  labels:
    app: geolux
    app.kubernetes.io/name: geolux
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: geolux
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: geolux
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: geolux
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8091
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: GEOLUX_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_MODE
            - name: GEOLUX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
            - name: GEOLUX_LITELLM_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_LITELLM_URL
            - name: GEOLUX_LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: litellm-api-key
            - name: GEOLUX_LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_LLM_MODEL
            - name: GEOLUX_STABILITY_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_STABILITY_THRESHOLD
            - name: GEOLUX_KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: GEOLUX_KAFKA_BROKERS
            - name: GEOLUX_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: admin-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
