apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: geolux
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  database-url: {{ .Values.database.url | quote }}
