apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: geolux-ci
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image-registry
      type: string
      default: quay.io/rhpds
    - name: helm-release
      type: string
      default: geolux
    - name: helm-namespace
      type: string
      default: geolux

  workspaces:
    - name: shared-workspace

  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
        kind: ClusterTask
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: run-tests
      runAfter: [fetch-source]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: backend-tests
            image: registry.access.redhat.com/ubi9/python-311:latest
            workingDir: $(workspaces.source.path)
            script: |
              pip install -e ".[dev,api]" --quiet
              python -m pytest tests/ -q --tb=short
              python -m behave tests/bdd/features/
          - name: frontend-tests
            image: node:22-alpine
            workingDir: $(workspaces.source.path)/frontend
            script: |
              npm ci --ignore-scripts
              npm test
              npx tsc --noEmit
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-api
      runAfter: [run-tests]
      taskRef:
        name: buildah
        kind: ClusterTask
      params:
        - name: IMAGE
          value: $(params.image-registry)/geolux:$(params.git-revision)
        - name: DOCKERFILE
          value: Containerfile
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: helm-deploy
      runAfter: [build-api]
      taskSpec:
        params:
          - name: release
          - name: namespace
          - name: image-tag
        workspaces:
          - name: source
        steps:
          - name: deploy
            image: alpine/helm:3.14
            workingDir: $(workspaces.source.path)
            script: |
              helm upgrade --install $(params.release) \
                deploy/helm/geolux/ \
                --namespace $(params.namespace) \
                --set image.tag=$(params.image-tag) \
                --wait --timeout 5m
      params:
        - name: release
          value: $(params.helm-release)
        - name: namespace
          value: $(params.helm-namespace)
        - name: image-tag
          value: $(params.git-revision)
      workspaces:
        - name: source
          workspace: shared-workspace
