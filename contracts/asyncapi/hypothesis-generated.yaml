asyncapi: 2.6.0

info:
  title: GeoLux Hypothesis Generated
  version: 1.0.0
  description: >
    Structured falsifiable hypotheses produced by the Hypothesis Engine (THE).
    Each hypothesis includes testable conditions, a confidence score, and a
    stability score, enabling downstream classification and event-bus routing.
  contact:
    name: GeoLux Platform Team

channels:
  geolux-hypothesis-generated:
    description: >
      Hypotheses emitted by the hypothesis engine after analysing incoming
      evidence bundles. Consumed by the classification engine and the
      Stargate event bus.
    bindings:
      kafka:
        partitions: 3
        replicas: 3
        topicConfiguration:
          retention.ms: 604800000
          cleanup.policy:
            - delete
    publish:
      operationId: publishHypothesisGenerated
      summary: Hypothesis engine publishes generated hypotheses.
      message:
        $ref: '#/components/messages/HypothesisGenerated'
      bindings:
        kafka:
          groupId:
            type: string
          clientId:
            type: string
    subscribe:
      operationId: consumeHypothesisGenerated
      summary: >
        Classification engine and Stargate event bus consume hypotheses
        for constraint evaluation and event routing.
      bindings:
        kafka:
          groupId:
            type: string
            enum:
              - classification-engine
              - stargate-event-bus

  x-ordering-guarantees:
    description: >
      Messages are partitioned by hypothesis_id. All updates related to the
      same hypothesis are routed to the same partition, preserving ordering.

  x-retention-policy:
    description: >
      Messages are retained for 7 days (604800000 ms). After the retention
      window, messages are eligible for deletion.

components:
  messages:
    HypothesisGenerated:
      name: HypothesisGenerated
      title: Hypothesis Generated Event
      summary: A falsifiable hypothesis produced by THE.
      contentType: application/json
      headers:
        type: object
        properties:
          partitionKey:
            type: string
            description: Set to hypothesis_id for ordering guarantees.
      payload:
        $ref: '#/components/schemas/HypothesisGeneratedPayload'
      examples:
        - name: ExampleHypothesisGenerated
          summary: A sample hypothesis about CPU throttling in us-east-1.
          headers:
            partitionKey: hyp-a1b2c3d4
          payload:
            hypothesis_id: hyp-a1b2c3d4
            claim: >
              Cluster us-east-1-prod is experiencing CPU throttling due to
              misconfigured resource limits on the inference-serving pods.
            testable_conditions:
              - condition: cpu_throttle_seconds > 30
                metric_source: kubelet
              - condition: container_cpu_cfs_throttled_periods_total increasing
                metric_source: cAdvisor
            confidence: 0.82
            stability_score: 0.91
            timestamp: "2026-06-02T14:31:05.000Z"

  schemas:
    HypothesisGeneratedPayload:
      type: object
      description: A structured falsifiable hypothesis with testable conditions.
      required:
        - hypothesis_id
        - claim
        - testable_conditions
        - confidence
        - stability_score
        - timestamp
      properties:
        hypothesis_id:
          type: string
          description: Unique identifier for this hypothesis.
          example: hyp-a1b2c3d4
        claim:
          type: string
          description: >
            Human-readable statement of the hypothesis claim that can be
            tested against observable conditions.
          example: >
            Cluster us-east-1-prod is experiencing CPU throttling due to
            misconfigured resource limits on the inference-serving pods.
        testable_conditions:
          type: array
          description: >
            List of conditions that can be evaluated to confirm or refute
            the hypothesis.
          items:
            type: object
            required:
              - condition
              - metric_source
            properties:
              condition:
                type: string
                description: A testable predicate expression.
                example: cpu_throttle_seconds > 30
              metric_source:
                type: string
                description: The telemetry source for evaluating this condition.
                example: kubelet
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Confidence score assigned by the hypothesis engine.
          example: 0.82
        stability_score:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: >
            Stability score indicating how stable the underlying signal is
            over the observation window.
          example: 0.91
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp of when the hypothesis was generated.
          example: "2026-06-02T14:31:05.000Z"
