stage: model-endpoint-ready
version: 2
constraints:
  - constraint_id: me-001
    constraint_name: Model endpoint evaluation passed
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: redeploy_model_endpoint
    geometric_stability_weight: 0.3

  - constraint_id: me-002
    constraint_name: Not a readiness probe failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*readiness_probe_failed).*$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: check_model_serving_runtime
    geometric_stability_weight: 0.3

  - constraint_id: me-003
    constraint_name: Not an invalid configuration failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*invalid_configuration).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: fix_model_configuration
    geometric_stability_weight: 0.5
