stage: cluster-health
version: 2
constraints:
  - constraint_id: ch-001
    constraint_name: Evaluation outcome is pass
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: investigate_cluster_health
    geometric_stability_weight: 0.3

  - constraint_id: ch-002
    constraint_name: No critical failure class
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: classify_failure
    geometric_stability_weight: 0.3

  - constraint_id: ch-003
    constraint_name: Not a crashloop failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*crashloop).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: investigate_crashloop
    geometric_stability_weight: 0.5

  - constraint_id: ch-004
    constraint_name: Not a deprecated API failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*deprecated_api).*$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: upgrade_api_version
    geometric_stability_weight: 0.3
