stage: vm-runtime-ready
version: 2
constraints:
  - constraint_id: vm-001
    constraint_name: VM runtime evaluation passed
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: start_vm
    geometric_stability_weight: 0.3

  - constraint_id: vm-002
    constraint_name: Not a VM migration backoff failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*vm_migration_backoff).*$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: check_vm_migration
    geometric_stability_weight: 0.3

  - constraint_id: vm-003
    constraint_name: Stage matches vm-runtime-ready
    assertion_type: pattern
    assertion_definition:
      field: stage_id
      pattern: "^vm-runtime-ready$"
    evidence_requirements:
      - stage_id
    severity: critical
    remediation_class: check_vm_stage
    geometric_stability_weight: 0.3
