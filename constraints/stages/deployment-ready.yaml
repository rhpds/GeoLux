stage: deployment-ready
version: 2
constraints:
  - constraint_id: dr-001
    constraint_name: Deployment evaluation passed
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: check_deployment
    geometric_stability_weight: 0.3

  - constraint_id: dr-002
    constraint_name: Not a scheduling failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*scheduling_failed).*$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: check_scheduling
    geometric_stability_weight: 0.3

  - constraint_id: dr-003
    constraint_name: Not a crashloop
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*pods_crashlooping).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: investigate_crash_loop
    geometric_stability_weight: 0.5
