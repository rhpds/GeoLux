stage: storage-clone-ready
version: 2
constraints:
  - constraint_id: sc-001
    constraint_name: Storage clone evaluation passed
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: reclone_storage_volume
    geometric_stability_weight: 0.3

  - constraint_id: sc-002
    constraint_name: Not a volume attach failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*volume_attach_failed).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: reattach_volume
    geometric_stability_weight: 0.5

  - constraint_id: sc-003
    constraint_name: Not a volume mount failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*volume_mount_failed).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: remount_volume
    geometric_stability_weight: 0.3
