stage: showroom-healthy
version: 1
constraints:
  - constraint_id: sh-001
    constraint_name: Showroom application reachable
    assertion_type: boolean
    assertion_definition:
      field: showroom_reachable
      value: true
    evidence_requirements:
      - showroom_reachable
    severity: critical
    remediation_class: restart_showroom
    geometric_stability_weight: 0.3

  - constraint_id: sh-002
    constraint_name: Showroom responds with 2xx
    assertion_type: range
    assertion_definition:
      field: showroom_status_code
      min: 200
      max: 299
    evidence_requirements:
      - showroom_status_code
    severity: major
    remediation_class: check_showroom_backend
    geometric_stability_weight: 0.3

  - constraint_id: sh-003
    constraint_name: Workshop content rendered correctly
    assertion_type: pattern
    assertion_definition:
      field: showroom_body_content
      pattern: "<title>.*</title>"
    evidence_requirements:
      - showroom_body_content
    severity: major
    remediation_class: rebuild_showroom_content
    geometric_stability_weight: 0.5
