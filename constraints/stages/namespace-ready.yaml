stage: namespace-ready
version: 2
constraints:
  - constraint_id: nr-001
    constraint_name: Namespace evaluation passed
    assertion_type: boolean
    assertion_definition:
      field: outcome
      value: pass
    evidence_requirements:
      - outcome
    severity: critical
    remediation_class: create_namespace
    geometric_stability_weight: 0.3

  - constraint_id: nr-002
    constraint_name: Not a claim misbound failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*claim_misbound).*$"
    evidence_requirements:
      - failure_class
    severity: major
    remediation_class: rebind_claims
    geometric_stability_weight: 0.3

  - constraint_id: nr-003
    constraint_name: Not a PVC binding failure
    assertion_type: pattern
    assertion_definition:
      field: failure_class
      pattern: "^(?!.*pvc_binding_failed).*$"
    evidence_requirements:
      - failure_class
    severity: critical
    remediation_class: check_pvc_binding
    geometric_stability_weight: 0.5
