id: integration
version: v0.2.0
component: end-to-end-integration
description: >
  Final EDD rubric matrix for end-to-end integration and deployment readiness.
  Updated post-deployment to infra01.

deployment:
  url: ""   # Set at deploy time
  namespace: geolux
  cluster: ""  # Set at deploy time
  mode: synthetic

evaluation_dimensions:
  end_to_end:
    description: Full pipeline flows through all components
    pass_criteria:
      - Synthetic scenario → classify → hypothesize → validate → MPC → route → audit
      - Healthy cluster pipeline produces passing classification + hypotheses
      - Failing cluster pipeline produces fail classification + hypotheses
      - All audit events present in trail
      - All 15 API endpoints returning 200 on production
    current_state: green
    test_count: 5

  all_components:
    description: Every component passes its individual gate
    pass_criteria:
      - Phase 1 Geometric Stability: PASSED
      - Phase 2 Hypothesis Engine: PASSED
      - Phase 3 Constraint Classification: PASSED
      - Phase 4 LLM-MPC: PASSED
      - Phase 5 Deepfield + NanoObs: PASSED
      - Phase 6 Launchpad Intelligence: PASSED
      - Phase 7 Synthetic Client + Replay: PASSED
      - Phase 8 Dashboard Extensions: PASSED
      - Gap closure: action executor, circuit breaker, metrics, consumers, replay, retention, objectives
    current_state: green

  security:
    description: Security hardening complete
    pass_criteria:
      - SSO/OIDC integration (api/security.py)
      - Input sanitization (XSS, SQL injection patterns)
      - Audit hash chain (tamper detection)
      - Circuit breaker on LLM calls
      - Security headers (CSP, HSTS, etc.)
      - Pre-commit secret detection
    current_state: green
    test_count: 28

  observability:
    description: Prometheus metrics and monitoring
    pass_criteria:
      - 12 Prometheus metrics defined
      - /metrics endpoint serving
      - HTTP request metrics, LLM call metrics, component metrics
    current_state: green

  helm:
    description: Helm charts render and deploy
    pass_criteria:
      - 10 templates (deployment, service, configmap, serviceaccount, secrets, route, network-policy, hpa, pdb, migration-job)
      - 3 values files (default, dev, prod)
      - Deployed to infra01 successfully
    current_state: green

  modes:
    description: LIVE/SYNTHETIC/REPLAY all work
    pass_criteria:
      - Mode switch via PUT /mode without restart
      - Mode visible in response headers
      - Replay mode guards replay-only endpoints
    current_state: green

  documentation:
    description: All documentation complete and current
    pass_criteria:
      - README.md (project overview)
      - ARCHITECTURE.md (full technical spec)
      - SECURITY.md (auth, OWASP, pen test vectors)
      - PERSISTENCE.md (column-level schema, PII, retention)
      - INTEGRATION_MAP.md (system diagram, data flows)
      - KNOWN_GAPS.md (deferred items, resolved gaps)
      - docs/SBE.md (concrete examples)
      - 7 operational runbooks
      - 7 OpenAPI specs + 9 AsyncAPI specs
      - 8 EDD rubric matrices
    current_state: green

  existing_stargate:
    description: All existing Stargate functionality unchanged
    pass_criteria:
      - GeoLux tables prefixed with glx_ (no collision)
      - No modifications to Stargate code
      - Cross-namespace NetworkPolicy for DB access
    current_state: green

promotion_gate:
  description: All dimensions stable green — DEPLOYED TO PRODUCTION
  status: PASSED

test_totals:
  pytest: 336
  bdd_scenarios: 41
  frontend_vitest: 3
  total: 380
  failures: 0
